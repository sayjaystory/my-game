```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AR Phonics A-Z</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">

<style>

:root{
--purple:#4F46E5;
--green:#22C55E;
--orange:#F97316;
--blue:#3B82F6;
--white:#FFFFFF;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Nunito',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
linear-gradient(135deg,
#4F46E5 0%,
#6D28D9 35%,
#22C55E 100%);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Floating Shapes */

.shape{
position:absolute;
border-radius:50%;
filter:blur(10px);
animation:float 8s ease-in-out infinite;
}

.shape1{
width:180px;
height:180px;
background:rgba(255,255,255,.15);
top:5%;
left:8%;
}

.shape2{
width:250px;
height:250px;
background:rgba(34,197,94,.20);
bottom:10%;
right:5%;
}

.shape3{
width:120px;
height:120px;
background:rgba(249,115,22,.20);
top:15%;
right:20%;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

/* Portal Card */

.portal{
width:min(95%,520px);
padding:35px;
border-radius:35px;

background:rgba(255,255,255,.15);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:2px solid rgba(255,255,255,.2);

box-shadow:
0 20px 60px rgba(0,0,0,.25);

text-align:center;
color:white;
}

/* Logo */

.logo{
font-size:90px;
margin-bottom:10px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
opacity:.95;
margin-bottom:25px;
}

/* Feature Cards */

.features{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:25px;
}

.feature{
background:rgba(255,255,255,.12);
border-radius:18px;
padding:15px;
}

.feature span{
display:block;
font-size:30px;
margin-bottom:5px;
}

.feature p{
font-size:14px;
}

/* Input */

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:18px;
font-size:20px;
text-align:center;
font-weight:900;
color:#333;
}

/* Buttons */

.start-btn{
width:100%;
padding:18px;

background:var(--orange);
color:white;

border:none;
border-radius:22px;

font-size:24px;
font-weight:900;

cursor:pointer;

transition:.3s;
box-shadow:0 8px 20px rgba(249,115,22,.35);
}

.start-btn:hover{
transform:translateY(-3px);
}

.start-btn:active{
transform:scale(.98);
}

.secondary{
margin-top:12px;

background:white;
color:var(--purple);

box-shadow:none;
}

/* Footer */

.footer{
margin-top:20px;
font-size:13px;
opacity:.85;
}

/* Mobile */

@media(max-width:600px){

.logo{
font-size:70px;
}

h1{
font-size:30px;
}

.features{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>
<div class="shape shape3"></div>

<div class="portal">

<div class="logo">🎯</div>

<h1>AR PHONICS A-Z</h1>

<div class="subtitle">
เรียนรู้เสียง Phonics ผ่านเทคโนโลยี AR<br>
เพียงใช้มือสัมผัสคำตอบบนหน้าจอ
</div>

<div class="features">

<div class="feature">
<span>📷</span>
<p>AR Hand Tracking</p>
</div>

<div class="feature">
<span>🔊</span>
<p>Phonics Sound</p>
</div>

<div class="feature">
<span>⭐</span>
<p>สะสมคะแนน</p>
</div>

<div class="feature">
<span>⏰</span>
<p>แข่งกับเวลา</p>
</div>

</div>

<div class="input-group">
<input
type="text"
id="playerName"
placeholder="กรอกชื่อผู้เล่น">
</div>

<button class="start-btn" onclick="startGame()">
🚀 เริ่มเล่นเกม
</button>

<button class="start-btn secondary">
📖 วิธีเล่น
</button>

<div class="footer">
Designed for Grade 1 Students<br>
AR Phonics Learning Game
</div>

</div>

<script>

function startGame(){

const playerName =
document.getElementById("playerName").value.trim();

if(playerName===""){
alert("กรุณากรอกชื่อผู้เล่น");
return;
}

/*
เปลี่ยนไปหน้าเกมจริง
window.location.href='game.html';

หรือ

เปิด Overlay เริ่มเกม
*/

localStorage.setItem(
'playerName',
playerName
);

alert(
'ยินดีต้อนรับ ' + playerName
);

}

</script>

</body>
</html>
```
