
<h2 class="sr-only">AR Finger Answer ป.1 — ชูนิ้ว 1, 2, 3 เพื่อตอบคำถาม</h2>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:'Nunito',var(--font-sans);padding:.5rem 0 1.5rem;}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.gtitle{font-size:20px;font-weight:900;color:var(--color-text-primary);}
.score-pill{background:#FFF3CD;color:#7B5E00;border:2px solid #F5C800;border-radius:999px;padding:6px 16px;font-size:16px;font-weight:900;}

.cat-tabs{display:flex;gap:8px;margin-bottom:.85rem;flex-wrap:wrap;}
.cat-btn{padding:7px 16px;border-radius:999px;font-size:14px;font-weight:900;cursor:pointer;border:2.5px solid transparent;font-family:'Nunito',var(--font-sans);transition:all .15s;}
.cat-btn.on{background:#4F46E5;color:#fff;border-color:#4F46E5;}
.cat-btn:not(.on){background:var(--color-background-secondary);color:var(--color-text-secondary);border-color:var(--color-border-tertiary);}

.stage-wrap{width:100%;margin-bottom:1rem;}
.stage{position:relative;width:100%;padding-top:100%;border-radius:20px;overflow:hidden;background:#0a0a1a;}
.stage-inner{position:absolute;inset:0;}
video{width:100%;height:100%;display:block;object-fit:cover;transform:scaleX(-1);}
canvas#ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.ar-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(79,70,229,.9);color:#fff;font-size:12px;font-weight:900;letter-spacing:1px;padding:4px 14px;border-radius:999px;white-space:nowrap;pointer-events:none;z-index:5;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4F46E5,transparent);animation:scan 2.5s linear infinite;opacity:.5;pointer-events:none;z-index:4;}
@keyframes scan{0%{top:0;}100%{top:100%;}}
.cc{position:absolute;width:22px;height:22px;border-color:#4F46E5;border-style:solid;opacity:.7;pointer-events:none;z-index:5;}
.cc.tl{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.cc.tr{top:10px;right:10px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.cc.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.cc.br{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}

.finger-hud{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border-radius:14px;padding:7px 18px;display:flex;align-items:center;gap:10px;pointer-events:none;z-index:5;}
.finger-big{font-size:32px;font-weight:900;color:#fff;font-family:'Nunito',sans-serif;min-width:24px;text-align:center;line-height:1;}
.finger-sub{font-size:11px;color:#aaa;font-weight:700;text-align:center;}
.fbar-row{display:flex;gap:4px;align-items:flex-end;height:28px;}
.fbar{width:10px;border-radius:4px 4px 0 0;background:#4F46E5;transition:height .12s;}

.start-btn{display:block;width:100%;padding:14px;background:#4F46E5;color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:900;cursor:pointer;font-family:'Nunito',var(--font-sans);margin-bottom:1rem;letter-spacing:.5px;}
.start-btn:hover{background:#3730A3;}

.q-bar{background:var(--color-background-primary);border:3px solid #4F46E5;border-radius:18px;padding:1rem 1.25rem;margin-bottom:.85rem;display:flex;align-items:center;gap:14px;}
.q-emoji{font-size:52px;line-height:1;}
.q-info{flex:1;}
.q-label{font-size:12px;font-weight:900;color:#4F46E5;letter-spacing:1px;margin-bottom:2px;}
.q-word{font-size:36px;font-weight:900;color:var(--color-text-primary);letter-spacing:2px;line-height:1.1;}
.q-hint{font-size:14px;color:var(--color-text-secondary);margin-top:3px;}

.hint-bar{text-align:center;font-size:15px;color:var(--color-text-secondary);margin-bottom:.85rem;font-weight:700;}
.hint-bar strong{color:#4F46E5;font-size:17px;}

.choices-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:.85rem;}
.choice-t{background:var(--color-background-secondary);border:3px solid var(--color-border-secondary);border-radius:16px;padding:14px 8px 12px;text-align:center;transition:all .2s;}
.choice-num{font-size:36px;font-weight:900;color:#4F46E5;font-family:'Nunito',var(--font-sans);display:block;line-height:1;}
.choice-finger{font-size:26px;display:block;margin:3px 0;}
.choice-text{font-size:15px;font-weight:900;color:var(--color-text-primary);display:block;margin-top:3px;line-height:1.2;}
.choice-t.highlight{border-color:#F59E0B;background:#FFFBEB;}
.choice-t.counting{border-color:#4F46E5;background:#EDE9FE;animation:pulse .4s ease infinite alternate;}
@keyframes pulse{0%{transform:scale(1);}100%{transform:scale(1.05);}}
.choice-t.correct-t{border-color:#22C55E;background:#DCFCE7;animation:pop .35s ease;}
.choice-t.wrong-t{border-color:#EF4444;background:#FEE2E2;animation:shake .3s ease;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

.feedback{text-align:center;min-height:28px;font-size:18px;font-weight:900;margin-bottom:.75rem;}
.fb-ok{color:#15803D;}
.fb-no{color:#B91C1C;}

.next-btn{display:none;width:100%;padding:14px;background:#4F46E5;color:#fff;border:none;border-radius:16px;font-size:18px;font-weight:900;cursor:pointer;font-family:'Nunito',var(--font-sans);}
.next-btn:hover{background:#3730A3;}
.next-btn.show{display:block;}

.prog-row{display:flex;align-items:center;gap:10px;margin-top:.85rem;}
.prog-lbl{font-size:13px;color:var(--color-text-secondary);white-space:nowrap;font-weight:700;}
.prog-bg{flex:1;height:10px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden;}
.prog-fg{height:100%;background:#4F46E5;border-radius:99px;transition:width .4s;}
</style>

<div class="app">
  <div class="topbar">
    <div class="gtitle">&#9995; AR Finger Answer</div>
    <div class="score-pill">&#11088; <span id="score">0</span></div>
  </div>

  <div class="cat-tabs">
    <button class="cat-btn on" onclick="switchCat('animals',this)">&#128062; Animals</button>
    <button class="cat-btn" onclick="switchCat('colors',this)">&#127912; Colors</button>
    <button class="cat-btn" onclick="switchCat('food',this)">&#127822; Food</button>
    <button class="cat-btn" onclick="switchCat('numbers',this)">&#128290; Numbers</button>
  </div>

  <div class="stage-wrap">
    <button class="start-btn" id="startBtn" onclick="startCam()">&#128247; เปิดกล้อง AR เพื่อเริ่มเล่น!</button>
    <div class="stage" id="stage" style="display:none;">
      <div class="stage-inner">
        <video id="vid" autoplay playsinline muted></video>
        <canvas id="ov"></canvas>
        <div class="ar-badge">&#127909; AR LIVE — ชูนิ้ว 1, 2, หรือ 3</div>
        <div class="scan-line"></div>
        <div class="cc tl"></div><div class="cc tr"></div>
        <div class="cc bl"></div><div class="cc br"></div>
        <div class="finger-hud" id="fingerHud">
          <div>
            <div class="finger-big" id="fingerNum">—</div>
            <div class="finger-sub">นิ้ว</div>
          </div>
          <div class="fbar-row">
            <div class="fbar" id="fb1" style="height:4px;"></div>
            <div class="fbar" id="fb2" style="height:4px;"></div>
            <div class="fbar" id="fb3" style="height:4px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="q-bar">
    <div class="q-emoji" id="qEmoji">&#128049;</div>
    <div class="q-info">
      <div class="q-label">&#128270; คำถาม</div>
      <div class="q-word" id="qWord">CAT</div>
      <div class="q-hint">แปลว่าอะไร?</div>
    </div>
  </div>

  <div class="hint-bar">&#9995; ชูนิ้ว <strong>1</strong>, <strong>2</strong>, หรือ <strong>3</strong> ค้างไว้สักครู่!</div>

  <div class="choices-row" id="choicesRow"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">&#9654;&#65039; คำถามถัดไป</button>

  <div class="prog-row">
    <span class="prog-lbl" id="progLbl">0 / 0</span>
    <div class="prog-bg"><div class="prog-fg" id="progFg" style="width:0%"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script>
const DB={
  animals:[
    {word:'CAT',thai:'แมว',emoji:'🐱'},
    {word:'DOG',thai:'สุนัข',emoji:'🐶'},
    {word:'BIRD',thai:'นก',emoji:'🐦'},
    {word:'FISH',thai:'ปลา',emoji:'🐟'},
    {word:'COW',thai:'วัว',emoji:'🐄'},
    {word:'PIG',thai:'หมู',emoji:'🐷'},
  ],
  colors:[
    {word:'RED',thai:'สีแดง',emoji:'🔴'},
    {word:'BLUE',thai:'สีน้ำเงิน',emoji:'🔵'},
    {word:'GREEN',thai:'สีเขียว',emoji:'🟢'},
    {word:'YELLOW',thai:'สีเหลือง',emoji:'🟡'},
    {word:'PINK',thai:'สีชมพู',emoji:'🩷'},
    {word:'WHITE',thai:'สีขาว',emoji:'⚪'},
  ],
  food:[
    {word:'APPLE',thai:'แอปเปิ้ล',emoji:'🍎'},
    {word:'BANANA',thai:'กล้วย',emoji:'🍌'},
    {word:'RICE',thai:'ข้าว',emoji:'🍚'},
    {word:'MILK',thai:'นม',emoji:'🥛'},
    {word:'EGG',thai:'ไข่',emoji:'🥚'},
    {word:'CAKE',thai:'เค้ก',emoji:'🎂'},
  ],
  numbers:[
    {word:'ONE',thai:'หนึ่ง',emoji:'1️⃣'},
    {word:'TWO',thai:'สอง',emoji:'2️⃣'},
    {word:'THREE',thai:'สาม',emoji:'3️⃣'},
    {word:'FOUR',thai:'สี่',emoji:'4️⃣'},
    {word:'FIVE',thai:'ห้า',emoji:'5️⃣'},
    {word:'SIX',thai:'หก',emoji:'6️⃣'},
  ],
};

let cat='animals',score=0,queue=[],qIdx=0,answered=false,done=0;
let curN=0,holdF=0,HOLD=22,lastConfirm=0;
let choices=[];

const vid=document.getElementById('vid');
const ov=document.getElementById('ov');
const octx=ov.getContext('2d');

function switchCat(c,btn){
  cat=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  resetGame();
}

function resetGame(){
  queue=[...DB[cat]].sort(()=>Math.random()-.5);
  qIdx=0;done=0;answered=false;holdF=0;curN=0;
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').classList.remove('show');
  updateProg();
  renderQ();
}

function renderQ(){
  if(qIdx>=queue.length){
    document.getElementById('feedback').innerHTML='<span class="fb-ok">🎉 เก่งมาก! หมดทุกคำแล้ว!</span>';
    document.getElementById('qWord').textContent='';
    document.getElementById('qEmoji').textContent='🎉';
    document.getElementById('choicesRow').innerHTML='';
    return;
  }
  answered=false;holdF=0;
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('feedback').textContent='';
  const q=queue[qIdx];
  document.getElementById('qEmoji').innerHTML=q.emoji;
  document.getElementById('qWord').textContent=q.word;

  const allThai=DB[cat].map(x=>x.thai);
  const wrong=allThai.filter(t=>t!==q.thai).sort(()=>Math.random()-.5).slice(0,2);
  choices=[q.thai,...wrong].sort(()=>Math.random()-.5);

  const fingers=['☝️','✌️','🤟'];
  document.getElementById('choicesRow').innerHTML=choices.map((c,i)=>`
    <div class="choice-t" id="ch${i+1}">
      <span class="choice-num">${i+1}</span>
      <span class="choice-finger">${fingers[i]}</span>
      <span class="choice-text">${c}</span>
    </div>
  `).join('');
}

function updateProg(){
  const t=queue.length,pct=t>0?Math.round((done/t)*100):0;
  document.getElementById('progFg').style.width=pct+'%';
  document.getElementById('progLbl').textContent=done+' / '+t;
}

async function startCam(){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stage').style.display='block';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    vid.srcObject=stream;
    await new Promise(r=>{vid.onloadedmetadata=r;});
    vid.play();
    ov.width=vid.videoWidth||480;
    ov.height=vid.videoHeight||480;
    initHands();
  }catch(e){fallbackMode();}
}

function initHands(){
  if(typeof Hands==='undefined'){fallbackMode();return;}
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.55,minTrackingConfidence:0.5});
  hands.onResults(onResults);
  (async function loop(){
    if(vid.readyState>=2) await hands.send({image:vid});
    requestAnimationFrame(loop);
  })();
}

function countFingers(lm){
  let c=0;
  const tips=[8,12,16,20],mids=[6,10,14,18];
  for(let i=0;i<4;i++) if(lm[tips[i]].y<lm[mids[i]].y) c++;
  if(lm[4].x>lm[3].x) c++;
  return Math.min(c,5);
}

function onResults(res){
  octx.clearRect(0,0,ov.width,ov.height);
  if(!res.multiHandLandmarks||!res.multiHandLandmarks.length){
    curN=0;holdF=0;updateHUD(0,0);highlightChoice(0);return;
  }
  const lm=res.multiHandLandmarks[0];
  const raw=countFingers(lm);
  const n=(raw>=1&&raw<=3)?raw:0;
  drawHand(lm,n);
  if(n===curN&&n>0) holdF++;
  else{curN=n;holdF=n>0?1:0;}
  const pct=n>0?Math.min(holdF/HOLD,1):0;
  updateHUD(n,pct);
  highlightChoice(n);
  drawArc(lm,pct,n);
  if(!answered&&n>0&&holdF>=HOLD){
    const now=Date.now();
    if(now-lastConfirm>1200){lastConfirm=now;resolveAnswer(n);}
  }
}

function drawHand(lm,n){
  const W=ov.width,H=ov.height;
  const pairs=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  octx.save();
  octx.strokeStyle=n>0?'#6366F1':'#666';
  octx.lineWidth=2.5;
  pairs.forEach(([a,b])=>{
    octx.beginPath();
    octx.moveTo((1-lm[a].x)*W,lm[a].y*H);
    octx.lineTo((1-lm[b].x)*W,lm[b].y*H);
    octx.stroke();
  });
  lm.forEach((p,i)=>{
    const tip=[4,8,12,16,20].includes(i);
    octx.beginPath();
    octx.arc((1-p.x)*W,p.y*H,tip?6:3.5,0,Math.PI*2);
    octx.fillStyle=tip?(n>0?'#818CF8':'#999'):'#fff';
    octx.fill();
  });
  octx.restore();
}

function drawArc(lm,pct,n){
  if(!n||!pct) return;
  const W=ov.width,H=ov.height;
  const cx=(1-lm[9].x)*W,cy=lm[9].y*H,r=36;
  octx.save();
  octx.beginPath();
  octx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
  octx.strokeStyle=pct>=1?'#22C55E':'#F59E0B';
  octx.lineWidth=5;octx.lineCap='round';octx.stroke();
  if(pct>=1){
    octx.font='bold 16px Nunito,sans-serif';
    octx.fillStyle='#22C55E';octx.textAlign='center';octx.textBaseline='middle';
    octx.fillText('✓',cx,cy);
  }
  octx.restore();
}

function updateHUD(n,pct){
  document.getElementById('fingerNum').textContent=n>0?n:'—';
  for(let i=1;i<=3;i++){
    const b=document.getElementById('fb'+i);
    const h=n>=i?Math.round(4+pct*22):4;
    b.style.height=h+'px';
    b.style.background=pct>=1?'#22C55E':(n>=i?'#4F46E5':'#444');
  }
}

function highlightChoice(n){
  for(let i=1;i<=3;i++){
    const el=document.getElementById('ch'+i);
    if(!el) continue;
    el.classList.remove('highlight','counting');
    if(i===n) el.classList.add(holdF>5?'counting':'highlight');
  }
}

function resolveAnswer(n){
  if(answered||qIdx>=queue.length) return;
  answered=true;holdF=0;
  const sel=choices[n-1],correct=queue[qIdx].thai;
  const el=document.getElementById('ch'+n);
  if(sel===correct){
    if(el)el.classList.add('correct-t');
    document.getElementById('feedback').innerHTML='<span class="fb-ok">🎉 ถูกต้อง! เก่งมากเลย!</span>';
    score+=10;document.getElementById('score').textContent=score;
    done++;speak(queue[qIdx].word);updateProg();
    setTimeout(()=>document.getElementById('nextBtn').classList.add('show'),700);
  }else{
    if(el)el.classList.add('wrong-t');
    const ci=choices.indexOf(correct)+1;
    document.getElementById('feedback').innerHTML='<span class="fb-no">❌ ลองใหม่นะ! คำตอบคือ ข้อ '+ci+' — '+correct+'</span>';
    setTimeout(()=>{
      if(el)el.classList.remove('wrong-t');
      answered=false;holdF=0;
    },1100);
  }
}

function nextQ(){
  qIdx++;
  for(let i=1;i<=3;i++){const e=document.getElementById('ch'+i);if(e)e.className='choice-t';}
  document.getElementById('feedback').textContent='';
  document.getElementById('nextBtn').classList.remove('show');
  holdF=0;curN=0;renderQ();
}

function fallbackMode(){
  document.getElementById('stage').style.display='none';
  document.getElementById('startBtn').style.display='none';
  document.getElementById('feedback').innerHTML='<span style="color:#F59E0B;font-size:14px;">⚠️ ไม่พบกล้อง — แตะตัวเลขเพื่อตอบได้เลย</span>';
  setTimeout(()=>{
    document.querySelectorAll('.choice-t').forEach((el,i)=>{
      el.style.cursor='pointer';
      el.onclick=()=>{if(!answered)resolveAnswer(i+1);};
    });
  },300);
  document.addEventListener('keydown',e=>{
    if(['1','2','3'].includes(e.key))resolveAnswer(parseInt(e.key));
  });
}

function speak(w){
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(w);
    u.lang='en-US';u.rate=0.75;speechSynthesis.speak(u);
  }
}

resetGame();
</script>
